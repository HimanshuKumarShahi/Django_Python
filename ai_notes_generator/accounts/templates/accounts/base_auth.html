<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Notes{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #030712;
            --bg2: #0a0f1e;
            --accent: #6366f1;
            --accent2: #8b5cf6;
            --accent-glow: rgba(99,102,241,0.4);
            --glass: rgba(15,22,41,0.85);
            --glass-border: rgba(99,102,241,0.25);
            --text: #f1f5f9;
            --text2: #94a3b8;
            --error: #ef4444;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ── Grid pattern ── */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none; z-index: 0;
        }

        /* ── Left panel ── */
        .auth-left {
            flex: 0 0 42%;
            background: linear-gradient(135deg, #0f1629 0%, #1a1040 50%, #0f1629 100%);
            position: relative;
            display: flex; flex-direction: column;
            justify-content: center; align-items: flex-start;
            padding: 60px;
            overflow: hidden;
        }
        .auth-left::before {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(99,102,241,0.25) 0%, transparent 70%);
            top: -100px; left: -100px;
            border-radius: 50%;
            animation: pulse 4s ease-in-out infinite;
        }
        .auth-left::after {
            content: '';
            position: absolute;
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(139,92,246,0.2) 0%, transparent 70%);
            bottom: 50px; right: -50px;
            border-radius: 50%;
            animation: pulse 4s ease-in-out infinite 2s;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        .auth-left-content { position: relative; z-index: 1; }
        .brand-logo {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 48px;
            text-decoration: none;
        }
        .brand-logo .logo-icon {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; box-shadow: 0 0 20px rgba(99,102,241,0.5);
        }
        .brand-logo span { font-size: 22px; font-weight: 800; color: var(--text); }

        .auth-left h1 {
            font-size: 38px; font-weight: 800; line-height: 1.2;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #f1f5f9 0%, #94a3b8 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .auth-left h1 .gradient-word {
            background: linear-gradient(135deg, #6366f1, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .auth-left p { color: var(--text2); font-size: 16px; line-height: 1.7; margin-bottom: 40px; }

        .feature-list { display: flex; flex-direction: column; gap: 16px; }
        .feature-item {
            display: flex; align-items: center; gap: 12px;
            color: var(--text2); font-size: 14px; font-weight: 500;
        }
        .feature-item .fi-icon {
            width: 32px; height: 32px;
            background: rgba(99,102,241,0.15);
            border: 1px solid rgba(99,102,241,0.3);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
        }

        /* ── Right panel (form) ── */
        .auth-right {
            flex: 1;
            display: flex; align-items: center; justify-content: center;
            padding: 40px;
            position: relative; z-index: 1;
            overflow-y: auto;
        }
        .auth-card {
            width: 100%; max-width: 420px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4), 0 0 0 1px rgba(99,102,241,0.1);
        }
        .auth-card h2 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
        .auth-card p.subtitle { color: var(--text2); font-size: 14px; margin-bottom: 28px; }

        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block; font-size: 13px; font-weight: 600;
            color: var(--text2); margin-bottom: 8px; letter-spacing: 0.02em;
        }
        .auth-input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 14px; font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .auth-input::placeholder { color: #475569; }
        .auth-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
            background: rgba(255,255,255,0.06);
        }

        .auth-btn {
            width: 100%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white; border: none;
            border-radius: 12px; padding: 13px;
            font-size: 15px; font-weight: 700;
            cursor: pointer; font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(99,102,241,0.35);
            margin-top: 8px;
        }
        .auth-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(99,102,241,0.5);
        }
        .auth-btn:active { transform: translateY(0); }

        .auth-link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text2); }
        .auth-link a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .auth-link a:hover { text-decoration: underline; }

        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 20px 0; color: #374151; font-size: 12px;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1;
            height: 1px; background: rgba(99,102,241,0.15);
        }

        /* Messages/Alerts */
        .alert {
            padding: 12px 16px; border-radius: 10px;
            margin-bottom: 16px; font-size: 13px; font-weight: 500;
            display: flex; align-items: center; gap: 8px;
        }
        .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
        .alert-success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
        .alert-info { background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.3); color: #a5b4fc; }
        .alert-warning { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); color: #fcd34d; }

        .field-error { color: #fca5a5; font-size: 12px; margin-top: 5px; }

        .remember-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        .checkbox-label { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2); cursor: pointer; }
        .checkbox-label input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; }
        .forgot-link { font-size: 13px; color: var(--accent); text-decoration: none; font-weight: 600; }
        .forgot-link:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            .auth-left { display: none; }
            body { overflow-y: auto; }
        }
    </style>
</head>
<body>
    {% block body %}{% endblock %}
</body>
</html>
