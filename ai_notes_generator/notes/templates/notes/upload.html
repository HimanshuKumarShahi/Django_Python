{% extends 'base.html' %}

{% block content %}
<div class="max-w-xl mx-auto mt-16 bg-white p-8 rounded-2xl shadow-xl border border-gray-100 relative overflow-hidden">
    
    <div class="text-center mb-8">
        <h2 class="text-3xl font-extrabold text-gray-900">AI Note Generator</h2>
        <p class="text-gray-500 mt-2 text-sm">Upload your lecture and let AI do the magic.</p>
    </div>

    <form id="uploadForm" method="POST" enctype="multipart/form-data" class="space-y-6">
        {% csrf_token %}
        
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Lecture Title</label>
            <input type="text" name="title" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all" placeholder="E.g., Python Basics Class 1">
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Upload Audio/Video</label>
            <input type="file" name="media_file" accept="audio/*,video/*" required class="w-full px-4 py-3 rounded-lg border border-gray-300 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition-all cursor-pointer">
        </div>

        <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition-all flex justify-center items-center gap-2">
            <span>Start Processing</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-8.707l-3-3a1 1 0 00-1.414 1.414L10.586 9H7a1 1 0 100 2h3.586l-1.293 1.293a1 1 0 101.414 1.414l3-3a1 1 0 000-1.414z" clip-rule="evenodd" /></svg>
        </button>
    </form>

    <div id="loadingOverlay" class="absolute inset-0 bg-white/95 backdrop-blur-sm hidden flex-col justify-center items-center z-10">
        
        <div class="relative w-24 h-24 mb-6">
            <div class="absolute inset-0 border-4 border-blue-100 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-blue-600 rounded-full border-t-transparent animate-spin"></div>
        </div>

        <h3 id="statusText" class="text-xl font-bold text-gray-800 mb-2 transition-opacity duration-300">Preparing file...</h3>
        <p id="subStatusText" class="text-sm text-gray-500 text-center px-6">Initializing background workers</p>
        
        <div class="mt-8 w-64 space-y-3">
            <div id="step1" class="flex items-center gap-3 text-gray-400 text-sm font-medium"><div class="w-2 h-2 rounded-full bg-gray-300"></div> Uploading to Cloudinary</div>
            <div id="step2" class="flex items-center gap-3 text-gray-400 text-sm font-medium"><div class="w-2 h-2 rounded-full bg-gray-300"></div> Redis passing task to Celery</div>
            <div id="step3" class="flex items-center gap-3 text-gray-400 text-sm font-medium"><div class="w-2 h-2 rounded-full bg-gray-300"></div> Gemini AI Generating Notes</div>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('uploadForm');
    const overlay = document.getElementById('loadingOverlay');
    const statusText = document.getElementById('statusText');
    const subStatusText = document.getElementById('subStatusText');
    const steps = [document.getElementById('step1'), document.getElementById('step2'), document.getElementById('step3')];
    
    // File input ko select karein
    const fileInput = document.querySelector('input[type="file"]');

    // 1. JS File Size Validation before upload
    fileInput.addEventListener('change', function() {
        const maxSize = 40 * 1024 * 1024; // 40 MB
        if (this.files[0].size > maxSize) {
            alert("File is too large! Please upload a file smaller than 40 MB. \nTip: MP3 Audio works best and uses less data!");
            this.value = ""; // Clear the file input automatically
        }
    });

    form.addEventListener('submit', function(e) {
        // UI overlay show karein
        overlay.classList.remove('hidden');
        overlay.classList.add('flex');

        setTimeout(() => {
            statusText.innerText = "Uploading Media...";
            subStatusText.innerText = "Compressing and sending to Cloudinary (Max 40MB)";
            steps[0].classList.replace('text-gray-400', 'text-blue-600');
            steps[0].children[0].classList.replace('bg-gray-300', 'bg-blue-600');
        }, 500);

        setTimeout(() => {
            statusText.innerText = "Task Queued!";
            subStatusText.innerText = "Celery worker picked up the task";
            steps[1].classList.replace('text-gray-400', 'text-blue-600');
            steps[1].children[0].classList.replace('bg-gray-300', 'bg-blue-600');
        }, 3000);

        setTimeout(() => {
            statusText.innerText = "AI is Thinking...";
            subStatusText.innerText = "Gemini 2.5 Flash is analyzing the context";
            steps[2].classList.replace('text-gray-400', 'text-blue-600');
            steps[2].children[0].classList.replace('bg-gray-300', 'bg-blue-600');
            steps[2].classList.add('animate-pulse');
        }, 6000);
    });
</script>
{% endblock %}
