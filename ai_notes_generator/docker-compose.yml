version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: ai_notes_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
    
    deploy:
      resources:
        limits:
          memory: 300M
        reservations:
          memory: 100M

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_notes_celery
    command: celery -A core worker --loglevel=info --concurrency=1 -E
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=host.docker.internal
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - .:/app
    working_dir: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 200M

volumes:
  redis_data:
    driver: local