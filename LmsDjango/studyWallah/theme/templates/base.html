{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StudyWallah{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    {% tailwind_css %}
</head>
<body class="bg-slate-50 min-h-screen flex flex-col font-sans">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-8">
            <a href="/" class="text-2xl font-black text-indigo-600 tracking-tighter">StudyWallah</a>
            <div class="hidden md:flex gap-6 text-sm font-semibold text-slate-600">
                <a href="{% url 'course_list' %}" class="hover:text-indigo-600 transition">Dashboard</a>
                <a href="#" class="hover:text-indigo-600 transition">All Courses</a>
            </div>
        </div>

        <div class="flex items-center gap-4">
            {% if user.is_authenticated %}
                <span class="text-sm text-slate-500 hidden sm:inline">Hello, **{{ user.username }}**</span>
                <a href="{% url 'settings' %}" class="p-2 bg-slate-100 rounded-full hover:bg-slate-200 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </a>
            {% else %}
                <a href="{% url 'login' %}" class="text-sm font-bold text-slate-700 hover:text-indigo-600">Log in</a>
                <a href="{% url 'register' %}" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-indigo-700 transition">Join Free</a>
            {% endif %}
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center py-10 px-4">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-white border-t border-slate-200 py-6 text-center">
        <p class="text-xs text-slate-400 uppercase tracking-widest font-bold">
            &copy; 2026 StudyWallah - Learning Redefined
        </p>
    </footer>

</body>
</html>
