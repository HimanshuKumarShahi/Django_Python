{% load tailwind_tags %}
{% tailwind_css %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Django Project</title>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-xl shadow-slate-200 border border-slate-100 text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
            </svg>
        </div>

        <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight mb-2">
            Hello World!
        </h1>
        
        <p class="text-slate-600 text-lg mb-8">
            Welcome to my first <span class="text-indigo-600 font-semibold">Django</span> project!
        </p>

        <a href="#" class="inline-block w-full py-3 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg transition duration-200 shadow-lg shadow-indigo-200">
            Get Started
        </a>

        <div class="mt-6 pt-6 border-t border-slate-100">
            <p class="text-xs text-slate-400 uppercase tracking-widest font-semibold">Powered by Python & Tailwind</p>
        </div>
    </div>

</body>
</html>
