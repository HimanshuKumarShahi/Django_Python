{% extends 'base.html' %}

{% block title %}Register | StudyWallah{% endblock %}

{% block content %}
<div class="text-center mb-6">
    <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Create Account</h1>
</div>

<form method="POST" class="space-y-4 text-left">
    {% csrf_token %}
    
    {% for field in form %}
    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
            <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
        {% endif %}
    </div>
    {% endfor %}

    <button type="submit" class="w-full py-3 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg transition duration-200">
        Register Now
    </button>
</form>
{% endblock %}
