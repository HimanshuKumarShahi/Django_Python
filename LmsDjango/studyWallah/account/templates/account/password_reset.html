{% extends 'base.html' %}

{% block content %}
<div class="text-center mb-8">
    <h1 class="text-2xl font-bold text-slate-900">Reset Password</h1>
    <p class="text-slate-500 mt-2">Enter your email and we'll send you a link.</p>
</div>

<form method="POST" class="space-y-4">
    {% csrf_token %}
    <input type="email" name="email" required placeholder="name@example.com" class="w-full px-4 py-3 rounded-lg border border-slate-200">
    <button type="submit" class="w-full py-3 bg-indigo-600 text-white rounded-lg">Send Reset Link</button>
</form>
{% endblock %}
