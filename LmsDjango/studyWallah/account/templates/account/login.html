{% extends 'base.html' %}

{% block title %}Login | StudyWallah{% endblock %}

{% block content %}
<div class="text-center mb-8">
    <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Welcome Back</h1>
    <p class="text-slate-500 mt-2">Sign in to your account</p>
</div>

<form method="POST" class="space-y-4">
    {% csrf_token %}
    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
        <input type="email" name="username" required class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition duration-200">
    </div>
    <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input type="password" name="password" required class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition duration-200">
    </div>

    <button type="submit" class="w-full py-3 px-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg shadow-lg shadow-indigo-100 transition duration-200">
        Sign In
    </button>
</form>

<div class="mt-4 text-center">
    <a href="{% url 'password_reset' %}" class="text-sm text-indigo-600 hover:text-indigo-800 font-medium">Forgot password?</a>
    <p class="text-sm text-slate-500 mt-2">
        Don't have an account? <a href="{% url 'register' %}" class="text-indigo-600 font-semibold">Register</a>
    </p>
</div>
{% endblock %}
