{% extends 'base.html' %}

{% block title %}Settings{% endblock %}

{% block content %}
<div class="text-center mb-6">
    {% if user.profile_photo %}
        <img src="{{ user.profile_photo.url }}" class="w-24 h-24 rounded-full mx-auto border-4 border-indigo-50 mb-4 object-cover">
    {% else %}
        <div class="w-24 h-24 bg-slate-100 rounded-full mx-auto flex items-center justify-center text-slate-400 mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
        </div>
    {% endif %}
    <h2 class="text-xl font-bold text-slate-900">{{ user.username }}</h2>
    <p class="text-slate-500 text-sm">{{ user.email }}</p>
</div>

<form method="POST" enctype="multipart/form-data" class="space-y-4">
    {% csrf_token %}
    {{ form.as_p }} <button type="submit" class="w-full py-3 px-6 bg-slate-900 hover:bg-black text-white font-semibold rounded-lg transition">
        Update Profile
    </button>
</form>

<form action="{% url 'logout' %}" method="post" class="mt-4">
    {% csrf_token %}
    <button type="submit" class="w-full text-red-600 font-medium text-sm hover:underline text-center">
        Log Out
    </button>
</form>
{% endblock %}
