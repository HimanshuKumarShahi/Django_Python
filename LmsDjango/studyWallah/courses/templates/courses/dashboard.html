{% extends 'base.html' %}

{% block content %}
<div class="max-w-7xl mx-auto w-full px-4 py-10">
    <h1 class="text-3xl font-bold mb-8">My Dashboard</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        {% for course in courses %}
<div class="bg-white p-6 rounded-2xl border">
    <h3 class="font-bold">{{ course.title }}</h3>
    <a href="{% url 'course_detail' course.id %}" class="mt-4 inline-block bg-indigo-600 text-white px-4 py-2 rounded-lg">
        Go to Class
    </a>
</div>
{% endfor %}
    </div>
</div>
{% endblock %}
