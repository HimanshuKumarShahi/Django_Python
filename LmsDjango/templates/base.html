{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My LMS{% endblock %}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen">

    <nav class="bg-blue-700 text-white shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="{% url 'home' %}" class="text-2xl font-bold tracking-tight">LMS Platform</a>
            <div class="space-x-4">
                <a href="{% url 'home' %}" class="hover:text-blue-200 transition">Home</a>
                <a href="{% url 'about' %}" class="hover:text-blue-200 transition">About</a>
                </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 flex-grow">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-gray-800 text-gray-300 text-center py-6 mt-auto">
        <p>&copy; 2026 LMS Platform. All rights reserved.</p>
    </footer>

</body>
</html>
